<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cielo</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
color:white;
font-family:Arial;
}

/* pantalla inicio */

#start{
position:absolute;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
background:black;
z-index:5;
cursor:pointer;
}

/* estrellas */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 3s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.3;}
to{opacity:1;}
}

/* cometas */

.comet{
position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
box-shadow:0 0 20px white, -40px 0 40px rgba(255,255,255,0.4);
animation:cometMove 4s linear forwards;
}

@keyframes cometMove{

0%{
transform:translate(-200px,-200px);
opacity:1;
}

100%{
transform:translate(1200px,800px);
opacity:0;
}

}

/* constelaciones */

.constellation line{
stroke:white;
stroke-width:1;
stroke-dasharray:100;
stroke-dashoffset:100;
animation:draw 5s forwards;
}

@keyframes draw{
to{
stroke-dashoffset:0;
}
}

/* mensaje final */

#message{
position:absolute;
bottom:15%;
width:100%;
text-align:center;
font-size:45px;
opacity:0;
transition:3s;
letter-spacing:4px;
}

/* imagen final */

#finalImage{
margin-top:30px;
width:300px;
max-width:80%;
border-radius:10px;
box-shadow:0 0 20px rgba(255,255,255,0.5);
opacity:0;
animation:fadeIn 3s forwards;
animation-delay:2s;
}

@keyframes fadeIn{
to{
opacity:1;
}
}

</style>
</head>

<body>

<div id="start">Haz clic para comenzar ✨</div>

<div id="message">

<div>Valery pasame la copia</div>

<img 
src="https://i.pinimg.com/1200x/b8/9c/0b/b89c0bf3a1f023cb5e1e0fab6e00ae74.jpg"
id="finalImage"
>

</div>

<div id="player" style="position:absolute;left:-9999px;"></div>

<svg class="constellation" width="100%" height="100%" style="position:absolute">

<line x1="200" y1="200" x2="250" y2="240"/>
<line x1="250" y1="240" x2="300" y2="210"/>
<line x1="300" y1="210" x2="340" y2="250"/>

<line x1="600" y1="150" x2="650" y2="180"/>
<line x1="650" y1="180" x2="700" y2="160"/>
<line x1="700" y1="160" x2="740" y2="200"/>

</svg>

<script>

/* generar estrellas */

for(let i=0;i<300;i++){

let star=document.createElement("div");
star.className="star";

star.style.left=Math.random()*100+"vw";
star.style.top=Math.random()*100+"vh";

star.style.animationDelay=Math.random()*3+"s";

document.body.appendChild(star);

}

/* crear cometas */

function createComet(){

let comet=document.createElement("div");
comet.className="comet";

comet.style.left=Math.random()*window.innerWidth+"px";
comet.style.top=Math.random()*window.innerHeight/2+"px";

document.body.appendChild(comet);

setTimeout(()=>comet.remove(),4000);

}

setInterval(createComet,7000);

/* youtube */

var tag=document.createElement('script');
tag.src="https://www.youtube.com/iframe_api";
document.head.appendChild(tag);

var player;

function onYouTubeIframeAPIReady(){

player=new YT.Player('player',{
height:'1',
width:'1',
videoId:'OXq-JP8w5H4',
playerVars:{
'autoplay':0,
'controls':0,
'loop':1,
'playlist':'OXq-JP8w5H4'
}
});

}

/* iniciar */

document.getElementById("start").onclick=function(){

this.style.display="none";

player.playVideo();

setTimeout(()=>{
document.getElementById("message").style.opacity=1;
},15000);

};

</script>

</body>
</html>
