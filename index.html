<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cielo</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
color:white;
font-family:Arial;
}

/* pantalla inicio */

#start{
position:absolute;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
background:black;
z-index:5;
cursor:pointer;
}

/* estrellas */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 3s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.3;}
to{opacity:1;}
}

/* estrellas fugaces */

.shooting{
position:absolute;
width:3px;
height:3px;
background:white;
box-shadow:0 0 10px white;
animation:shoot 2s linear forwards;
}

@keyframes shoot{
0%{
transform:translate(0,0);
opacity:1;
}
100%{
transform:translate(400px,200px);
opacity:0;
}
}

/* constelaciones */

.constellation line{
stroke:white;
stroke-width:1;
stroke-dasharray:100;
stroke-dashoffset:100;
animation:draw 4s forwards;
}

@keyframes draw{
to{
stroke-dashoffset:0;
}
}

/* mensaje final */

#message{
position:absolute;
bottom:15%;
width:100%;
text-align:center;
font-size:45px;
opacity:0;
transition:3s;
letter-spacing:4px;
}

</style>
</head>

<body>

<div id="start">Haz clic para comenzar ✨</div>

<div id="message">Valery pasame la copia</div>

<div id="player" style="position:absolute;left:-9999px;"></div>

<svg class="constellation" width="100%" height="100%" style="position:absolute">

<line x1="200" y1="200" x2="250" y2="240"/>
<line x1="250" y1="240" x2="300" y2="210"/>
<line x1="300" y1="210" x2="340" y2="250"/>

<line x1="600" y1="150" x2="650" y2="180"/>
<line x1="650" y1="180" x2="700" y2="160"/>
<line x1="700" y1="160" x2="740" y2="200"/>

</svg>

<script>

/* generar estrellas */

for(let i=0;i<250;i++){

let star=document.createElement("div");
star.className="star";

star.style.left=Math.random()*100+"vw";
star.style.top=Math.random()*100+"vh";

star.style.animationDelay=Math.random()*3+"s";

document.body.appendChild(star);

}

/* estrellas fugaces */

function shootingStar(){

let star=document.createElement("div");
star.className="shooting";

star.style.left=Math.random()*window.innerWidth+"px";
star.style.top=Math.random()*window.innerHeight/2+"px";

document.body.appendChild(star);

setTimeout(()=>star.remove(),2000);

}

setInterval(shootingStar,5000);

/* API youtube */

var tag=document.createElement('script');
tag.src="https://www.youtube.com/iframe_api";
document.head.appendChild(tag);

var player;

function onYouTubeIframeAPIReady(){

player=new YT.Player('player',{
height:'1',
width:'1',
videoId:'OXq-JP8w5H4',
playerVars:{
'autoplay':0,
'controls':0,
'loop':1,
'playlist':'OXq-JP8w5H4'
}
});

}

/* iniciar todo */

document.getElementById("start").onclick=function(){

this.style.display="none";

player.playVideo();

setTimeout(()=>{
document.getElementById("message").style.opacity=1;
},15000);

};

</script>

</body>
</html>
